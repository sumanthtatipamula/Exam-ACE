<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password - Exam Ace</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            margin: 0 0 16px 0;
        }
        p {
            color: #666;
            line-height: 1.6;
        }
        .button {
            display: inline-block;
            margin-top: 24px;
            padding: 12px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔒</div>
        <h1>Opening Exam Ace...</h1>
        <p>If the app doesn't open automatically, tap the button below.</p>
        <a href="#" id="openApp" class="button">Open in App</a>
    </div>

    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (token) {
            // Try to open the app with deep link
            const deepLink = `examace://reset-password?token=${token}`;
            window.location.href = deepLink;
            
            // Set button to also try opening
            document.getElementById('openApp').href = deepLink;
            
            // Fallback: if app doesn't open in 2 seconds, show message
            setTimeout(() => {
                document.querySelector('p').textContent = 
                    'Please make sure you have the Exam Ace app installed.';
            }, 2000);
        } else {
            document.querySelector('h1').textContent = 'Invalid Link';
            document.querySelector('p').textContent = 
                'This password reset link is invalid or expired.';
            document.getElementById('openApp').style.display = 'none';
        }
    </script>
</body>
</html>
