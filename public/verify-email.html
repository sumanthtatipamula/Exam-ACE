<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verify Email - Exam Ace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { animation: spin 0.8s linear infinite; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-500 to-purple-700 p-4 sm:p-6 md:p-8">

    <div class="w-full max-w-sm sm:max-w-md bg-white rounded-2xl shadow-2xl p-6 sm:p-8 md:p-10 text-center">

        <!-- Loading State -->
        <div id="loading">
            <div class="text-5xl sm:text-6xl mb-4">✉️</div>
            <h1 class="text-lg sm:text-xl md:text-2xl font-bold text-gray-800 mb-4">Verifying your email...</h1>
            <div class="spinner inline-block w-10 h-10 border-4 border-gray-200 border-t-indigo-500 rounded-full"></div>
        </div>

        <!-- Success State -->
        <div id="success" class="hidden">
            <div class="text-5xl sm:text-6xl mb-4">✅</div>
            <h1 class="text-lg sm:text-xl md:text-2xl font-bold text-green-700 mb-3">Email Verified!</h1>
            <p class="text-sm sm:text-base text-gray-500 leading-relaxed mb-6">Your email has been successfully verified. You can now sign in to Exam Ace.</p>
            <a href="#" id="openApp"
               class="inline-block px-8 py-3 bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-semibold rounded-lg shadow-md hover:opacity-90 active:scale-95 transition-all text-sm sm:text-base">
                Open App
            </a>
        </div>

        <!-- Error State -->
        <div id="error" class="hidden">
            <div class="text-5xl sm:text-6xl mb-4">❌</div>
            <h1 class="text-lg sm:text-xl md:text-2xl font-bold text-red-600 mb-3">Verification Failed</h1>
            <p id="errorMsg" class="text-sm sm:text-base text-gray-500 leading-relaxed mb-6">Something went wrong.</p>
            <a href="#" id="openAppErr"
               class="inline-block px-8 py-3 bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-semibold rounded-lg shadow-md hover:opacity-90 active:scale-95 transition-all text-sm sm:text-base">
                Open App
            </a>
        </div>

        <!-- Invalid State -->
        <div id="invalid" class="hidden">
            <div class="text-5xl sm:text-6xl mb-4">⚠️</div>
            <h1 class="text-lg sm:text-xl md:text-2xl font-bold text-gray-800 mb-3">Invalid Link</h1>
            <p class="text-sm sm:text-base text-gray-500 leading-relaxed">This verification link is invalid. Please check your email for the correct link.</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        const isAndroid = /android/i.test(navigator.userAgent);
        const appLink = isAndroid
            ? 'intent://#Intent;scheme=examace;package=com.examace.exam_ace;end'
            : 'examace://sign-in';

        function show(id) {
            ['loading','success','error','invalid'].forEach(s =>
                document.getElementById(s).classList.toggle('hidden', s !== id));
        }

        if (!token) {
            show('invalid');
        } else {
            fetch('/api/verify-email', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({token})
            })
            .then(r => r.json().then(data => ({ok: r.ok, data})))
            .then(({ok, data}) => {
                if (ok && data.success) {
                    show('success');
                    document.getElementById('openApp').href = appLink;
                } else {
                    show('error');
                    document.getElementById('errorMsg').textContent =
                        data.error || 'Verification failed. The link may have expired.';
                    document.getElementById('openAppErr').href = appLink;
                }
            })
            .catch(() => {
                show('error');
                document.getElementById('errorMsg').textContent =
                    'Network error. Please check your connection and try again.';
                document.getElementById('openAppErr').href = appLink;
            });
        }
    </script>
</body>
</html>
