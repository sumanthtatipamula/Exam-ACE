<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Exam Ace</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            padding: 60px 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        .icon {
            font-size: 80px;
            margin-bottom: 24px;
        }
        h1 {
            color: #333;
            margin: 0 0 16px 0;
            font-size: 32px;
        }
        p {
            color: #666;
            line-height: 1.6;
            font-size: 18px;
            margin-bottom: 32px;
        }
        .stores {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .store-badge {
            display: inline-block;
            padding: 12px 24px;
            background: #000;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .store-badge:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🎓</div>
        <h1>Exam Ace</h1>
        <p>Track your exam preparation with daily tasks, syllabus management, mock tests, and progress tracking.</p>
        <div class="stores">
            <a href="#" class="store-badge">📱 Download on App Store</a>
            <a href="#" class="store-badge">🤖 Get it on Google Play</a>
        </div>
    </div>
</body>
</html>
